
syntax = "proto3";

package proto;


// From future
// I forgot how i was supposed to change this
// and what is was inspired from

message Iterm2ActionRequest {


}

message Iterm2QueryRequest {

}

message Iterm2ActionRequestReply {

    enum Status {
        TIMEOUT = 0;
        FAILED = 1;
        REQUEST_MALFORMED = 2;
        INVALID_ID = 3;
    }

    message Error {
        optional Status status = 1;
        optional string error_response = 2;
    }

    message Success {
        optional Status status = 1;
    }

    oneof disposition {
        Error error = 1;
        Success success = 2;
    }
}


// Current 

service Iterm2Remote {
    rpc SpawnTerminal (SpawnTerminalRequest) returns (DoRequestReply) {}
    rpc SendToTerminal (SendToTerminalRequest) returns (DoRequestReply) {}
    rpc JumpToTerminal (JumpToTerminalRequest) returns (DoRequestReply) {}
    rpc PeekTerminal (PeekTerminalRequest) returns (DoRequestReply) {}
}

message SpawnTerminalRequest {
    optional string terminal_name = 1;
    optional bool focus_term = 2;
    optional string shell = 3;
    optional string command = 4;
}

message SendToTerminalRequest {
    string terminal_name = 1;
    string request_type = 2;
    string request_content = 3;
}

message JumpToTerminalRequest {
    string terminal_name = 1;
}

message PeekTerminalRequest {
    string terminal_name = 2;
    optional int32 peek_length = 3;
}

message DoRequestReply {
    bool ok = 1;
    optional string error = 2;
}
